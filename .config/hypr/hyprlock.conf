general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    # CAMBIÁ ESTA RUTA por un wallpaper que tengas en la Kaze
    path = /home/moreki/Pictures/Wallpapers/Anime/wallhaven-vpqpem.png
    #blur_passes = 3 
    #blur_size = 7
    #noise = 0.0117
    #contrast = 0.8916
    brightness = 0.8172
    vignette = 0.2
    vignette_opacity = 0.5
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    fade_timeout = 100
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    # Usamos un comando de shell para asegurar que el tiempo se actualice
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}