# --- Configuración de Prefijo ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- Ajustes Generales ---
set -g mouse on
set -g default-terminal "tmux-256color"
# CORRECCIÓN AQUÍ: terminal-features separado y con el comando correcto
set -as terminal-features ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1

# --- Atajos Personalizados ---
# Recarga rápida (apuntando a tu carpeta en .config)
bind r source-file ~/.config/tmux/tmux.conf \; display "¡Configuración Recargada!"

# Splits intuitivos
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# --- Estética y Visibilidad (Letras Blancas) ---
set -g status-style bg=default,fg=white
set -g status-left '#[fg=green,bold][#S] #[default]'
set -g status-left-length 20
set -g status-right '#[fg=yellow,bold]%H:%M #[fg=white,bold]%d-%b-%y'

setw -g window-status-current-style fg=black,bg=white,bold
setw -g window-status-style fg=white,bg=default

set -g pane-border-style fg=white
set -g pane-active-border-style fg=green