# --- Configuración de Prefijo ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- Ajustes Generales ---
set -g mouse on
set -g default-terminal "tmux-256color"
set -aserial-features ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1

# --- Atajos Personalizados ---
# Recarga rápida corregida
bind r source-file ~/.tmux.conf \; display "¡Configuración Recargada!"

# Splits intuitivos
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# --- Estética y Visibilidad (Letras Blancas) ---
# Barra de estado: fondo transparente/negro y letras blancas
set -g status-style bg=default,fg=white

# Lado izquierdo: Nombre de sesión en verde brillante para que resalte
set -g status-left '#[fg=green,bold][#S] #[default]'
set -g status-left-length 20

# Lado derecho: Hora en amarillo y Fecha en blanco (con mayor contraste)
set -g status-right '#[fg=yellow,bold]%H:%M #[fg=white,bold]%d-%b-%y'

# Estilo de la ventana activa (para que sepas dónde estás parado)
setw -g window-status-current-style fg=black,bg=white,bold
setw -g window-status-style fg=white,bg=default

# Bordes de los paneles (para que se distingan bien los splits)
set -g pane-border-style fg=white
set -g pane-active-border-style fg=green